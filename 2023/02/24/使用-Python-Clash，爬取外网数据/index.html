              <div class="markdown-body">
                
                <p>有的时候，希望能够爬取一些外网的数据，但是开启<code>Clash</code>之类的软件后，发现会直接报<code>requests.exceptions.ProxyError</code>的错误。最近学会了该如何操作，其实很简单，代码如下：</p>
<span id="more"></span>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">import</span> requests<br><span class="hljs-keyword">import</span> urllib3<br><br><br><span class="hljs-comment"># 设置了verify=False后(在后面)会有警告，关闭警告</span><br>urllib3.disable_warnings()<br><br>url = <span class="hljs-string">"https://www.google.com"</span><br><br><span class="hljs-comment"># Clash默认的代理端口为7890</span><br>proxies = {<br>    <span class="hljs-string">'http'</span>: <span class="hljs-string">'http://127.0.0.1:7890/'</span>,<br>    <span class="hljs-string">'https'</span>: <span class="hljs-string">'http://127.0.0.1:7890/'</span><br>}<br><br>response = requests.get(url=url, verify=<span class="hljs-literal">False</span>, proxies=proxies)<br></code></pre></td></tr></table></figure>
<p>结果如下，可见请求已经成功</p>
